spring.application.name=json-to-db-importer
server.address=127.0.0.1
server.port=8080
importer.config-file=${user.home}/.json-to-db-importer/config.json
# No Spring-managed DataSource is ever used: ConnectionFactory builds a SingleConnectionDataSource
# per DbConfig at runtime (spec section 3). Without this exclude, DataSourceAutoConfiguration still
# tries to build a default HikariDataSource (HikariCP is on the classpath via spring-boot-starter-jdbc)
# and fails hard because no spring.datasource.* is configured - breaking every full @SpringBootTest.
spring.autoconfigure.exclude=org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
